<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Configurar Recuerdos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/styles/admin/memories.css" />
    <link rel="stylesheet" href="/styles/components/buttons.css" />

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/js/ui/icons.js"></script>
  </head>

  <body class="view-admin">

    <button class="btn-icon btn-icon--primary back-btn" data-back>
      <i data-lucide="arrow-left"></i>
    </button>
  
    <main class="admin-main">
      <section class="section-create">
        <header class="section-header">
          <h2>Configuración de recuerdos</h2>
          <p class="section-description">
            Controla cuándo los invitados pueden subir fotos y videos.
          </p>
        </header>

        <div class="field">
          <label>
            <input type="checkbox" id="enabled" />
            Recuerdos activos
          </label>
        </div>

        <div class="field">
          <label>Fecha inicio</label>
          <input type="datetime-local" id="start_at" />
        </div>

        <div class="field">
          <label>Fecha fin</label>
          <input type="datetime-local" id="end_at" />
        </div>

        <div class="actions-create">
          <button class="btn btn--ghost" id="save">Guardar cambios</button>
        </div>

        <p id="status" class="create-status"></p>
      </section>
    </main>

    <script type="module" src="/js/admin/memories.js"></script>
  </body>
</html>
