<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invitaciones</title>

    <!-- <link rel="stylesheet" href="/frontend/styles/admin/invitation.css" /> -->
    <link rel="stylesheet" href="/styles/components/buttons.css" />
    <link rel="stylesheet" href="/styles/admin/invitation.css" />

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/js/ui/icons.js"></script>
  </head>

  <body class="view-admin">
    
    <button class="btn-icon btn-icon--primary back-btn" data-back>
      <i data-lucide="arrow-left"></i>
    </button>

    <section class="section-invitations-list">
      <header class="section-header list-header">
        <div>
          <h2>Gestión de invitaciones</h2>
          <p class="section-description">
            Administra invitaciones, revisa estados y corrige información si es
            necesario.
          </p>
        </div>
        <!-- Esta clase controla las acciones del formulario -->
        <div class="header-actions">
          <button class="btn btn--danger" id="btnLogout">Volver</button>
          <button class="btn btn--primary-green" id="btnCreateInvitation">
            + Crear invitación
          </button>
        </div>
      </header>

      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Invitado principal</th>
            <th>Acompañantes</th>
            <th>Mesa</th>
            <th>Estado</th>
            <th>Link</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="invitationsTableBody">
          <!-- Se llena por JS -->
        </tbody>
      </table>
    </section>

    <script type="module" src="/js/admin/invitation.js"></script>
  </body>
</html>
