<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Galería del evento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="/frontend/styles/variables.css" />
    <link rel="stylesheet" href="/frontend/styles/photos/gallery.css" />
    <link rel="stylesheet" href="/frontend/styles/components/buttons.css" />

    <!-- Lucide -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/frontend/js/ui/icons.js"></script>
  </head>

  <body class="view-public">
    <header class="admin-header">
      <button class="btn-icon btn-icon--primary back-btn" data-back>
        <i data-lucide="arrow-left"></i>
      </button>
      <h1 class="admin-header__title">Galería</h1>
    </header>

    <main class="admin-main">
      <section class="section-create">
        <h2>Galería del evento</h2>

        <!-- GRID -->
        <div id="list"></div>

        <div class="pagination">
          <div class="pagination__info">
            <span class="pagination__count"></span>

            <label class="pagination__rows">
              Archivos:
              <select id="itemsPerPage">
                <option value="6">6</option>
                <option value="12" selected>12</option>
                <option value="24">24</option>
                <option value="48">48</option>
              </select>
            </label>
          </div>

          <div class="pagination__controls">
            <button class="btn btn--ghost" data-page="first">Inicio</button>
            <button class="btn btn--ghost" data-page="prev">Anterior</button>

            <span class="pagination__page">
              Página
              <input type="number" id="currentPage" min="1" />
              <span></span>
            </span>

            <button class="btn btn--ghost" data-page="next">Siguiente</button>
            <button class="btn btn--ghost" data-page="last">Final</button>
          </div>
        </div>
      </section>
    </main>

    <!-- MODAL OVERLAY REAL -->
    <div id="viewer-modal" class="modal hidden">
      <div class="modal-backdrop"></div>

      <div class="modal-card modal-card--viewer">
        <button class="viewer-close" aria-label="Cerrar">✕</button>
        <img id="viewer-img" />
        <video id="viewer-video" controls></video>
      </div>
    </div>

    <!--JS CORRECTO (MODULE) -->
    <script type="module" src="/frontend/js/photos/gallery.js"></script>
  </body>
</html>
