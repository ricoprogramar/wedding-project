<!-- modal.html -->
<div id="confirmationModal" class="modal" style="display:none;">
  <div class="modal__content">
    <button id="modalClose" class="modal__close">&times;</button>
    <h2 class="modal-title">Confirmar Asistencia</h2>
    <p class="modal-subtitle">Por favor confirma tu asistencia y la de tus acompañantes:</p>

    <!-- Lista de invitados dinámica -->
    <div id="guestList" class="guest-list"></div>

    <!-- Formulario de confirmación -->
    <form id="attendanceForm">
      <div class="form-group">
        <label for="confirmName">Tu nombre completo:</label>
        <input type="text" id="confirmName" name="confirmName" placeholder="Escribe tu nombre completo" required />
        <small class="input-error" style="display:none;color:red;font-size:0.85rem;">El nombre no coincide con el invitado principal.</small>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn--primary btn-submit-confirm">Confirmar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal de mensaje de confirmación -->
<div id="confirmationMessage" class="confirmation-modal" style="display:none;">
  <div class="confirmation-modal__content">
    <p>¡Tu asistencia ha sido confirmada!</p>
  </div>
</div>
